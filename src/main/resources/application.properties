spring.application.name=market-board

spring.datasource.url=jdbc:mysql://localhost:3306/market_board?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.buildenough.marketboard
mybatis.configuration.map-underscore-to-camel-case=true

server.port=8080