<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 상세</title>
</head>
<body>
<h1>게시글 상세</h1>

<div>
    <p>번호: <span th:text="${post.postId}"></span></p>
    <p>제목: <span th:text="${post.title}"></span></p>
    <p>작성자: <span th:text="${post.writerName}"></span></p>
    <p>조회수: <span th:text="${post.viewCount}"></span></p>
    <p>작성일: <span th:text="${post.createdAt}"></span></p>
</div>

<hr>

<div>
    <p th:text="${post.content}"></p>
</div>

<a href="/posts">목록으로</a>
<a th:href="@{/posts/{postId}/edit(postId=${post.postId})}">수정</a>

<form th:action="@{/posts/{postId}/delete(postId=${post.postId})}" method="POST">
    <button type="submit">삭제</button>
</form>

</body>
</html>
