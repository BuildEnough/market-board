<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 목록</title>
</head>
<body>
<h1>게시글 목록</h1>

<a href="/posts/write">글쓰기</a>
<a href="/">홈으로</a>

<table border="1">
    <thead>
    <tr>
        <th>번호</th>
        <th>제목</th>
        <th>작성자</th>
        <th>조회수</th>
        <th>작성일</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="post : ${posts}">
        <td th:text="${post.postId}"></td>
        <td th:text="${post.title}"></td>
        <td th:text="${post.writerName}"></td>
        <td th:text="${post.viewCount}"></td>
        <td th:text="${post.createdAt}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
