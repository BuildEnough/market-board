<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 작성</title>
</head>
<body>
<h1>게시글 작성</h1>

<form action="/posts" method="post">

        <label>제목</label>

<a href="/">홈으로</a>

</body>
</html>
