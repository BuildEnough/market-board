<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Market Board</title>
</head>
<body>
<h1>Market Board</h1>

<div th:if="${loginMember == null}">
    <a href="/members/join">회원가입</a>
    <a href="/members/login">로그인</a>
</div>

<div th:if="${loginMember != null}">
    <p>
        <span th:text="${loginMember.name}"></span>님 로그인 중
    </p>

    <form action="/members/logout" method="post">
        <button type="submit">로그아웃</button>
    </form>
</div>

</body>
</html>
